{% extends 'base_dashboard.html' %}

{% block title %}Upload Agreement - Raahat Plaza{% endblock %}

{% block content %}
<div class="page-header">
    <h1><i class="fas fa-upload"></i> Upload Signed Agreement</h1>
    <p>Rental #{{ rental.id }} · Shop {{ rental.shop.shop_number }}</p>
</div>

<div class="form-card">
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="form-group">
            <label>Signed Agreement File (PDF)</label>
            {{ form.file }}
        </div>
        <div class="form-group">
            <label>Description</label>
            {{ form.description }}
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary"><i class="fas fa-upload"></i> Upload</button>
            <a href="{% url 'tenant_agreements' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
